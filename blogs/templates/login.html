{% extends 'base.html' %}
{% load static %}

{% block title %}Login - SignAI Studio{% endblock %}

{% block content %}
<div class="form-card">
    <div style="text-align: center; margin-bottom: 2rem;">
        <div class="card-icon" style="margin: 0 auto 1rem;"><i class="fa-solid fa-right-to-bracket"></i></div>
        <h1 style="font-size: 2rem;">Welcome Back</h1>
        <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.4rem;">Sign in to your SignAI Studio account</p>
    </div>

    {% if msg %}
        <div class="alert alert-danger">{{ msg }}</div>
    {% endif %}

    <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" name="t1" class="form-input" placeholder="Enter your username" required autofocus>
        </div>

        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="t2" class="form-input" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.8rem;">
            <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In
        </button>
    </form>

    <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-secondary);">
        Don't have an account? <a href="{% url 'registration' %}" style="font-weight: 600;">Create one now</a>
    </div>
</div>
{% endblock %}
