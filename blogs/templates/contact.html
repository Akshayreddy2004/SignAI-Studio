{% extends 'base.html' %}
{% load static %}

{% block title %}Contact - SignAI Studio Team{% endblock %}

{% block content %}
<div class="form-card" style="max-width: 550px;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <div class="card-icon" style="margin: 0 auto 1rem; background: rgba(6, 182, 212, 0.15); color: #67e8f9;"><i class="fa-solid fa-envelope-open-text"></i></div>
        <h1 style="font-size: 2rem;">Get in Touch</h1>
        <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.4rem;">Have questions about our Sign Language AI or feedback? We'd love to hear from you.</p>
    </div>

    <form method="POST" action="{% url 'contact' %}">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Your Name</label>
            <input type="text" name="name" class="form-input" placeholder="Enter your full name" required autofocus>
        </div>

        <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-input" placeholder="Enter your email address" required>
        </div>

        <div class="form-group">
            <label class="form-label">Subject</label>
            <input type="text" name="subject" class="form-input" placeholder="What is this regarding?" required>
        </div>

        <div class="form-group">
            <label class="form-label">Message</label>
            <textarea name="message" class="form-input" rows="4" placeholder="Type your message here..." required style="resize: vertical;"></textarea>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.8rem; background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);">
            <i class="fa-solid fa-paper-plane"></i> Send Message
        </button>
    </form>
</div>
{% endblock %}
