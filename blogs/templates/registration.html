{% extends 'base.html' %}
{% load static %}

{% block title %}Sign Up - SignAI Studio{% endblock %}

{% block content %}
<div class="form-card" style="max-width: 500px;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <div class="card-icon" style="margin: 0 auto 1rem; background: rgba(236, 72, 153, 0.15); color: #f472b6;"><i class="fa-solid fa-user-plus"></i></div>
        <h1 style="font-size: 2rem;">Create Account</h1>
        <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.4rem;">Join SignAI Studio to unlock translation history logs</p>
    </div>

    {% if msg %}
        <div class="alert {% if 'Success' in msg or 'Registered' in msg %}alert-success{% else %}alert-danger{% endif %}">{{ msg }}</div>
    {% endif %}

    <form method="POST" action="{% url 'registration' %}">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" name="t1" class="form-input" placeholder="e.g. T Harish" required autofocus>
        </div>

        <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" name="t2" class="form-input" placeholder="e.g. harish@example.com" required>
        </div>

        <div class="form-group">
            <label class="form-label">Mobile Number</label>
            <input type="text" name="t3" class="form-input" placeholder="e.g. 9876543210">
        </div>

        <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" name="t4" class="form-input" placeholder="Choose a unique username" required>
        </div>

        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="t5" class="form-input" placeholder="Create a strong password" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.8rem; background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%);">
            <i class="fa-solid fa-check"></i> Register Account
        </button>
    </form>

    <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-secondary);">
        Already have an account? <a href="{% url 'login' %}" style="font-weight: 600;">Sign in instead</a>
    </div>
</div>
{% endblock %}
